# GitHub Actions CI — atlas-frontend (Angular).
#
# Raw-tools workflow mirroring the npm scripts documented in CLAUDE.md
# (`npm run lint` / `npm run typecheck` / `npm test`). The unit tests run on the
# Angular Vitest builder (`@angular/build:unit-test`) in a jsdom environment, so
# no browser/display is needed. `npm ci` is the shared expensive step, so the
# three checks run as steps in one job rather than re-installing per job.
#
# All third-party actions are pinned to a commit SHA (supply-chain rule: no
# floating refs; every pin verified >14 days old). The trailing comment records
# the human-readable tag and release date each SHA corresponds to.

name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  ci:
    name: Lint, Typecheck & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2 (2026-01-09)
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0 (2026-04-20)
        with:
          node-version: 26.0.0
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Lint (eslint + prettier)
        run: npm run lint
      - name: Typecheck (tsc --noEmit)
        run: npm run typecheck
      - name: Unit tests (Vitest)
        run: npm test
