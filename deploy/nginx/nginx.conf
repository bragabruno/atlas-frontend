server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression for JS/CSS bundles
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;
    gzip_vary on;

    # Runtime config — served fresh on every request so AKS can replace it via
    # a ConfigMap volume mount at /usr/share/nginx/html/config.json.
    # No caching so a rollout that changes config is picked up immediately.
    location = /config.json {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        add_header Pragma "no-cache";
        try_files $uri =404;
    }

    # Static assets emitted by ng build use content-hash filenames — safe to
    # cache aggressively.
    location ~* \.(js|css|ico|woff2?|ttf|eot|svg|png|jpg|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Lightweight health endpoint for AKS liveness/readiness probes.
    # Returns 200 without touching disk beyond the already-resident nginx worker.
    location = /health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # SPA fallback: any path that does not match a real file is served
    # index.html so Angular's client-side router handles it.
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-store";
    }
}
